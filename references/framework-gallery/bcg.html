<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>BCG 矩阵</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">BCG 矩阵</div><div class="en">BCG Growth-Share Matrix</div></div>
<div style="flex:1;display:flex;flex-direction:column;">
    <div style="display:flex;font-size:15px;color:#999;font-weight:bold;padding:0 20px 8px;"><div style="flex:1;text-align:center;">← 市场份额</div></div>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;"><div class="card" style="--c:#CF0A2C;border-top-width:5px;"><div style="font-size:22px;font-weight:bold;color:#CF0A2C;margin-bottom:10px;">明星 Star</div><div style="font-size:16px;color:#595959;white-space:pre-line;">高增长高份额
加大投入</div></div><div class="card" style="--c:#669900;border-top-width:5px;"><div style="font-size:22px;font-weight:bold;color:#669900;margin-bottom:10px;">现金牛 Cash Cow</div><div style="font-size:16px;color:#595959;white-space:pre-line;">低增长高份额
维持收割</div></div><div class="card" style="--c:#FF9900;border-top-width:5px;"><div style="font-size:22px;font-weight:bold;color:#FF9900;margin-bottom:10px;">问题 Question</div><div style="font-size:16px;color:#595959;white-space:pre-line;">高增长低份额
选择性投入</div></div><div class="card" style="--c:#DCDDDD;border-top-width:5px;"><div style="font-size:22px;font-weight:bold;color:#DCDDDD;margin-bottom:10px;">瘦狗 Dog</div><div style="font-size:16px;color:#595959;white-space:pre-line;">低增长低份额
退出/剥离</div></div></div>
    <div style="text-align:center;font-size:15px;color:#999;font-weight:bold;padding:8px 0 0;">市场增长率 ↑</div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
