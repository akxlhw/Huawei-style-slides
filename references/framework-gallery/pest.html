<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>PESTEL 分析</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">PESTEL 分析</div><div class="en">Political-Economic-Social-Tech-Env-Legal</div></div>
<div style="flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:24px;"><div class="card" style="--c:#CF0A2C;"><div style="font-size:21px;font-weight:bold;color:#CF0A2C;margin-bottom:8px;">P 政治Political</div><div style="font-size:17px;color:#595959;line-height:1.5;">人才政策/签证/劳动法</div></div><div class="card" style="--c:#007DFF;"><div style="font-size:21px;font-weight:bold;color:#007DFF;margin-bottom:8px;">E 经济Economic</div><div style="font-size:17px;color:#595959;line-height:1.5;">薪酬通胀/融资环境</div></div><div class="card" style="--c:#669900;"><div style="font-size:21px;font-weight:bold;color:#669900;margin-bottom:8px;">S 社会Social</div><div style="font-size:17px;color:#595959;line-height:1.5;">远程办公/择业观变化</div></div><div class="card" style="--c:#FF9900;"><div style="font-size:21px;font-weight:bold;color:#FF9900;margin-bottom:8px;">T 技术Technological</div><div style="font-size:17px;color:#595959;line-height:1.5;">AI替代/AI赋能</div></div><div class="card" style="--c:#669900;"><div style="font-size:21px;font-weight:bold;color:#669900;margin-bottom:8px;">E 环境Environmental</div><div style="font-size:17px;color:#595959;line-height:1.5;">绿色低碳/ESG</div></div><div class="card" style="--c:#007DFF;"><div style="font-size:21px;font-weight:bold;color:#007DFF;margin-bottom:8px;">L 法律Legal</div><div style="font-size:17px;color:#595959;line-height:1.5;">数据合规/反歧视</div></div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
