<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>业务画布 BMC</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">业务画布 BMC</div><div class="en">Business Model Canvas</div></div>
<div style="flex:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:1fr 1fr 1fr;gap:14px;"><div class="card" style="--c:#CF0A2C;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#CF0A2C;margin-bottom:6px;">关键合作伙伴</div><div style="font-size:15px;color:#595959;line-height:1.4;">供应商/渠道/高校</div></div><div class="card" style="--c:#007DFF;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#007DFF;margin-bottom:6px;">关键业务</div><div style="font-size:15px;color:#595959;line-height:1.4;">寻访/评估/录用</div></div><div class="card" style="--c:#669900;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#669900;margin-bottom:6px;">核心资源</div><div style="font-size:15px;color:#595959;line-height:1.4;">人才库/雇主品牌</div></div><div class="card" style="--c:#CF0A2C;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#CF0A2C;margin-bottom:6px;">价值主张</div><div style="font-size:15px;color:#595959;line-height:1.4;">高效精准匹配</div></div><div class="card" style="--c:#007DFF;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#007DFF;margin-bottom:6px;">客户关系</div><div style="font-size:15px;color:#595959;line-height:1.4;">长期服务/信任</div></div><div class="card" style="--c:#669900;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#669900;margin-bottom:6px;">渠道</div><div style="font-size:15px;color:#595959;line-height:1.4;">内推/猎头/校招</div></div><div class="card" style="--c:#CF0A2C;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#CF0A2C;margin-bottom:6px;">客户细分</div><div style="font-size:15px;color:#595959;line-height:1.4;">业务部门/候选人</div></div><div class="card" style="--c:#999;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#999;margin-bottom:6px;">成本结构</div><div style="font-size:15px;color:#595959;line-height:1.4;">渠道费/人力/工具</div></div><div class="card" style="--c:#999;padding:18px;"><div style="font-size:18px;font-weight:bold;color:#999;margin-bottom:6px;">收入来源</div><div style="font-size:15px;color:#595959;line-height:1.4;">到岗产出/留存价值</div></div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
