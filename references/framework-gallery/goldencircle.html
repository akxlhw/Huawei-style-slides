<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>黄金圈</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>

<div style="flex:1;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 1740 800" style="width:75%;max-height:720px;"><circle cx="870" cy="400" r="300" fill="#CF0A2C" fill-opacity="0.12" stroke="#CF0A2C" stroke-width="2"/><text x="870" y="130" text-anchor="middle" font-size="20" fill="#CF0A2C" font-weight="bold">What 做什么</text><circle cx="870" cy="400" r="200" fill="#007DFF" fill-opacity="0.12" stroke="#007DFF" stroke-width="2"/><text x="870" y="230" text-anchor="middle" font-size="20" fill="#007DFF" font-weight="bold">How 怎么做</text><circle cx="870" cy="400" r="100" fill="#669900" fill-opacity="0.12" stroke="#669900" stroke-width="2"/><text x="870" y="330" text-anchor="middle" font-size="20" fill="#669900" font-weight="bold">Why 为什么</text><circle cx="870" cy="400" r="50" fill="#669900"/><text x="870" y="406" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">核心</text></svg></div>
