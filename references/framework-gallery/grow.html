<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>GROW 辅导模型</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">GROW 辅导模型</div><div class="en">Goal-Reality-Options-Will</div></div>
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;"><div style="display:flex;align-items:stretch;gap:24px;margin-bottom:20px;">
        <div style="width:80px;background:#CF0A2C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;border-radius:8px 0 0 8px;">1</div>
        <div class="card" style="--c:#CF0A2C;border-top:none;border-left:5px solid #CF0A2C;border-radius:0 8px 8px 0;flex:1;">
        <div style="font-size:22px;font-weight:bold;color:#CF0A2C;margin-bottom:6px;">G Goal 目标</div><div style="font-size:18px;color:#595959;">明确想达成的结果</div></div></div><div style="display:flex;align-items:stretch;gap:24px;margin-bottom:20px;">
        <div style="width:80px;background:#007DFF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;border-radius:8px 0 0 8px;">2</div>
        <div class="card" style="--c:#007DFF;border-top:none;border-left:5px solid #007DFF;border-radius:0 8px 8px 0;flex:1;">
        <div style="font-size:22px;font-weight:bold;color:#007DFF;margin-bottom:6px;">R Reality 现状</div><div style="font-size:18px;color:#595959;">客观描述当前情况</div></div></div><div style="display:flex;align-items:stretch;gap:24px;margin-bottom:20px;">
        <div style="width:80px;background:#669900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;border-radius:8px 0 0 8px;">3</div>
        <div class="card" style="--c:#669900;border-top:none;border-left:5px solid #669900;border-radius:0 8px 8px 0;flex:1;">
        <div style="font-size:22px;font-weight:bold;color:#669900;margin-bottom:6px;">O Options 选项</div><div style="font-size:18px;color:#595959;">探索所有可能方案</div></div></div><div style="display:flex;align-items:stretch;gap:24px;margin-bottom:20px;">
        <div style="width:80px;background:#FF9900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;border-radius:8px 0 0 8px;">4</div>
        <div class="card" style="--c:#FF9900;border-top:none;border-left:5px solid #FF9900;border-radius:0 8px 8px 0;flex:1;">
        <div style="font-size:22px;font-weight:bold;color:#FF9900;margin-bottom:6px;">W Will 意愿</div><div style="font-size:18px;color:#595959;">承诺行动与时间</div></div></div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
