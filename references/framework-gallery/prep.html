<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>PREP 表达法</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">PREP 表达法</div><div class="en">Point-Reason-Example-Point</div></div>
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;"><div class="card" style="--c:#CF0A2C;margin-bottom:18px;display:flex;gap:20px;align-items:center;">
        <div style="width:54px;height:54px;border-radius:50%;background:#CF0A2C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;flex-shrink:0;">P</div>
        <div><div style="font-size:20px;font-weight:bold;color:#CF0A2C;">P 观点 Point</div><div style="font-size:17px;color:#595959;margin-top:4px;">开门见山亮结论：建议采用内推为主渠道</div></div></div><div class="card" style="--c:#007DFF;margin-bottom:18px;display:flex;gap:20px;align-items:center;">
        <div style="width:54px;height:54px;border-radius:50%;background:#007DFF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;flex-shrink:0;">R</div>
        <div><div style="font-size:20px;font-weight:bold;color:#007DFF;">R 理由 Reason</div><div style="font-size:17px;color:#595959;margin-top:4px;">内推性价比 3.6，是付费渠道的 3 倍</div></div></div><div class="card" style="--c:#669900;margin-bottom:18px;display:flex;gap:20px;align-items:center;">
        <div style="width:54px;height:54px;border-radius:50%;background:#669900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;flex-shrink:0;">E</div>
        <div><div style="font-size:20px;font-weight:bold;color:#669900;">E 例证 Example</div><div style="font-size:17px;color:#595959;margin-top:4px;">Q3 内推入职 9 人，留存率 90%</div></div></div><div class="card" style="--c:#CF0A2C;margin-bottom:18px;display:flex;gap:20px;align-items:center;">
        <div style="width:54px;height:54px;border-radius:50%;background:#CF0A2C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;flex-shrink:0;">P</div>
        <div><div style="font-size:20px;font-weight:bold;color:#CF0A2C;">P 重申 Point</div><div style="font-size:17px;color:#595959;margin-top:4px;">综上，应将内推作为招聘主力渠道</div></div></div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
