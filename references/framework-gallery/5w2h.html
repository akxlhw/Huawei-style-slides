<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>5W2H 分析法</title>
<style>
:root{--red:#CF0A2C;--blue:#007DFF;--green:#669900;--orange:#FF9900;--yellow:#FCC800;
--gray:#DCDDDD;--title:#1a1a1a;--body:#595959;--muted:#999;--line:#E8E8E8;--bg:#F7F8FA;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;}
.slide{width:1920px;height:1080px;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:70px 90px 60px;}
.brand{position:absolute;left:0;top:0;width:10px;height:100%;background:#CF0A2C;}
.twrap{position:relative;margin-bottom:36px;}
.tag{display:inline-block;font-size:15px;color:#CF0A2C;font-weight:bold;background:rgba(207,10,44,.08);padding:4px 14px;border-radius:3px;margin-bottom:12px;}
.h1{font-size:40px;font-weight:bold;color:#1a1a1a;}
.en{font-size:16px;color:#999;margin-top:6px;}
.arc{position:absolute;left:0;bottom:-14px;width:280px;height:20px;}
.src{position:absolute;left:90px;bottom:28px;font-size:13px;color:#999;}
.pn{position:absolute;right:90px;bottom:28px;font-size:14px;color:#999;}
.card{background:#F7F8FA;border-radius:8px;padding:24px;border-top:4px solid var(--c,#CF0A2C);}
</style></head>
<body><div class="slide"><div class="brand"></div>
<div class="twrap"><span class="tag">思维框架示例</span>
<div class="h1">5W2H 分析法</div><div class="en">What-Why-Who-When-Where-How-HowMuch</div></div>
<div style="flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-content:center;"><div class="card" style="--c:#CF0A2C;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#CF0A2C;margin-bottom:10px;">What 什么</div><div style="font-size:17px;color:#595959;">做什么：招聘后端工程师 5 名</div></div><div class="card" style="--c:#007DFF;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#007DFF;margin-bottom:10px;">Why 为什么</div><div style="font-size:17px;color:#595959;">业务扩张，技术债积压</div></div><div class="card" style="--c:#669900;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#669900;margin-bottom:10px;">Who 谁</div><div style="font-size:17px;color:#595959;">HRBP-A 负责寻访</div></div><div class="card" style="--c:#FF9900;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#FF9900;margin-bottom:10px;">When 何时</div><div style="font-size:17px;color:#595959;">Q4 内到岗</div></div><div class="card" style="--c:#FCC800;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#FCC800;margin-bottom:10px;">Where 何地</div><div style="font-size:17px;color:#595959;">北京/上海研发中心</div></div><div class="card" style="--c:#CF0A2C;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#CF0A2C;margin-bottom:10px;">How 怎么做</div><div style="font-size:17px;color:#595959;">内推+猎头并行</div></div><div class="card" style="--c:#007DFF;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#007DFF;margin-bottom:10px;">How much 多少</div><div style="font-size:17px;color:#595959;">预算 30 万，周期 60 天</div></div></div>
<div class="src">来源：华为 Style Slides 框架图库</div></div>
</body></html>
