  - {idx: 5, layout: data_table, title: "内部调配人员详表与匹配度评估", key_point: "姓名、原岗位、目标岗、匹配度、上岗时间"}
  - {idx: 6, layout: timeline, title: "人员调配实施时间表与关键节点", key_point: "沟通、交接、上岗、跟踪四阶段"}
